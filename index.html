<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Santos BJJ | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #b8860b; --bg-chumbo: #1a1a1a; --bg-sidebar: #1a1a1a; --bg-card: #111111; --bg-hover: #2d2d2d; --bg-active: #3d3d3d; --text-light: #e0e0e0; --sidebar-width: 260px; }
        * { font-family: 'Roboto', sans-serif !important; box-sizing: border-box; }
        body { background-color: var(--bg-chumbo); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        nav { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 2px solid var(--primary); display: flex; flex-direction: column; padding: 10px 0; flex-shrink: 0; overflow-y: auto; }
        .nav-item { padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; border-left: 5px solid transparent; color: #888; transition: 0.3s; }
        .nav-item:hover { color: #fff; background: var(--bg-hover); }
        .nav-item.active { background: var(--bg-active); color: #fff; border-left-color: var(--primary); }
        
        /* ÁREA PRINCIPAL */
        main { flex-grow: 1; padding: 10px 20px; overflow: hidden; background-color: var(--bg-chumbo); display: flex; flex-direction: column; } 
        h2 { font-family: 'Big Shoulders Display', sans-serif !important; font-size: 2.2rem; color: #fff; margin: 0 0 10px 0; text-transform: uppercase; }
        
        /* CONTAINER DO IFRAME */
        .iframe-container { width: 100%; flex-grow: 1; background: #141414; border: 1px solid #333; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        iframe { width: 100%; height: 100%; border: none; background: transparent; }
    </style>
</head>
<body>
    <nav>
        <div style="text-align:center; padding-bottom:20px;">
            <img src="https://carlosaccs.github.io/pimsantosbjj/Logomenor.png" style="width: 100px;">
        </div>
        <div class="nav-item active" id="btn-prontuario" onclick="navegar('RegistroAlunos', this)">Prontuário do Aluno</div>
        
        <div class="nav-item" id="btn-professores" onclick="navegar('RegistroProfessores', this)">Cadastro de Professores</div>
        
        <div class="nav-item" id="btn-config" onclick="navegar('ConfiguracoesTecnicas', this)">Configurações Técnicas</div>
    </nav>

    <main>
        <h2 id="titulo-pagina">Prontuário do Aluno</h2>
        
        <div class="iframe-container">
            <iframe id="framePrincipal" 
                    src="https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec?page=RegistroAlunos">
            </iframe>
        </div>
    </main>

<script>
    const urlGoogleBase = "https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec";

    function navegar(pagina, elemento) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        elemento.classList.add('active');

        const titulos = {
            'RegistroAlunos': 'Prontuário do Aluno',
            'RegistroProfessores': 'Cadastro de Professores',
            'RegistroTurmas': 'Cadastro de Turmas',
            'ConfiguracoesTecnicas': 'Configurações Técnicas'
        };
        document.getElementById('titulo-pagina').innerText = titulos[pagina] || 'Sistema';

        const novaUrl = urlGoogleBase + "?page=" + pagina;
        document.getElementById('framePrincipal').src = novaUrl;
    }

    window.addEventListener('message', function(event) {
        if (event.data.tipo === 'SOLICITAR_SALVAR') {
            document.getElementById('framePrincipal').contentWindow.postMessage({ tipo: 'EXECUTAR_SALVAR' }, '*');
        }
    });
</script>
</body>
</html>
