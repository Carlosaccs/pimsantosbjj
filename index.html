<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Santos BJJ | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #b8860b; 
            --bg-chumbo: #1a1a1a;
            --bg-sidebar: #1a1a1a;
            --bg-card: #111111; 
            --bg-hover: #2d2d2d; 
            --bg-active: #3d3d3d; 
            --text-light: #e0e0e0; 
            --sidebar-width: 260px; 
            --vermelho-viva: #b30000;
        }

        * { font-family: 'Roboto', sans-serif !important; box-sizing: border-box; }
        body { background-color: var(--bg-chumbo); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        nav { 
            width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 2px solid var(--primary); 
            display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; overflow-y: auto;
        }

        .nav-label { color: #555; font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 25px; text-transform: uppercase; }
        .nav-item { padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; border-left: 5px solid transparent; color: #888; transition: 0.3s; }
        .nav-item:hover { color: #fff; background: var(--bg-hover); }
        .nav-item.active { background: var(--bg-active); color: #fff; border-left-color: var(--primary); }
        
        main { flex-grow: 1; padding: 15px 40px; overflow-y: auto; background-color: var(--bg-chumbo); } 
        
        .section-content { display: none; }
        .section-content.active { display: block; }

        h2 { 
            font-family: 'Big Shoulders Display', sans-serif !important; 
            font-size: 2.5rem; color: #fff; 
            margin-top: 0 !important; margin-bottom: 10px; 
            text-transform: uppercase; 
        }

        .search-bar {
            display: flex; gap: 15px; background: #222; padding: 12px; 
            border-radius: 4px; border: 1px solid #444; margin-bottom: 15px;
            align-items: flex-end;
        }

        .search-field { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        .search-field label { color: var(--primary); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .search-field input { 
            background: #000 !important; color: #fff !important; border: 1px solid #555 !important; 
            padding: 8px; border-radius: 4px; outline: none; font-size: 13px;
        }

        .btn-acao {
            background: var(--bg-active); color: #fff; border: 1px solid #555;
            padding: 8px 15px; cursor: pointer; font-weight: bold; font-size: 12px;
            border-radius: 4px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-acao:hover { background: var(--primary); }
        .btn-whats { background: #25d366; color: #fff; border: none; display: none; }

        .tab-container { display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px; width: 100%; }
        .tabs-wrapper { display: flex; gap: 10px; flex-grow: 1; }
        .tab-button {
            background: #2d2d2d; color: #888; border: 1px solid #444; padding: 10px 18px;
            cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.75rem; border-radius: 4px; transition: 0.3s;
        }
        .tab-button.active { background: var(--primary); color: white; border-color: var(--primary); }

        .form-card { 
            background: var(--bg-card); padding: 20px; border-radius: 4px; 
            border-top: 4px solid var(--primary); max-width: 1100px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-height: 1180px; margin-top: 5px; 
        }
        
        iframe { width: 100%; border: none; background: transparent; }
        
        #buscaNome, #buscaCPF, input[type="text"] { text-transform: uppercase; }
        ::placeholder { text-transform: none; }
    </style>
</head>
<body>

    <nav>
        <div style="text-align:center; padding-bottom:30px;">
            <img src="https://carlosaccs.github.io/pimsantosbjj/Logomenor.png" style="width: 120px; height: auto;">
            <div style="font-family:'Big Shoulders Display' !important; font-size: 1.6rem; margin-top:10px; color: #fff;">PIM SANTOS BJJ</div>
        </div>
        <div class="nav-item active" onclick="showSection('dashboard', this)">Painel de Controle</div>
        <div class="nav-label">Gestão de Alunos</div>
        <div class="nav-item" onclick="abrirAluno(this)">Prontuário do Aluno</div>
        <div class="nav-label">Cadastros</div>
        <div class="nav-item" onclick="abrirCadastro('professor', this)">Professores</div>
    </nav>

    <main>
        <section id="dashboard" class="section-content active">
            <h2>Visão Geral</h2>
            <div class="form-card" style="min-height: auto;"><p style="color: #666;">Painel de indicadores em desenvolvimento.</p></div>
        </section>

        <section id="secao-registro" class="section-content" style="max-width: 1000px; margin-left: 20px;">
            <h2 id="titulo-central">PRONTUÁRIO DO ALUNO</h2>

            <div class="search-bar">
                <div class="search-field">
                    <label>Buscar por Nome:</label>
                    <input type="text" id="buscaNome" placeholder="Digite o nome...">
                </div>
                <div class="search-field" style="max-width: 150px;">
                    <label>Buscar por CPF:</label>
                    <input type="text" id="buscaCPF" placeholder="000.000.000-00">
                </div>
                
                <div style="display: flex; gap: 5px;">
                    <button id="btnBuscar" class="btn-acao" onclick="buscarDadosAluno()">BUSCAR</button>
                    <div id="controlesNavegacao" style="display: none; gap: 5px;">
                        <button class="btn-acao" onclick="navegarResultados(-1)"> < </button>
                        <span id="infoResultados" style="color: var(--primary); font-weight: bold; align-self: center; font-size: 12px;">1/1</span>
                        <button class="btn-acao" onclick="navegarResultados(1)"> > </button>
                    </div>
                    <button class="btn-acao" onclick="limparBusca()" style="background:#444;">NOVO</button>
                </div>
                
                <button id="btnWhatsEvolucao" class="btn-acao btn-whats" onclick="enviarWhatsEvolucao()">WhatsApp Evolução</button>
            </div>

            <div class="tab-container">
                <div id="wrapper-abas" class="tabs-wrapper">
                    <div class="tab-button active" onclick="mudarSubAba('cadastro', this)">CADASTRO</div>
                    <div class="tab-button" onclick="mudarSubAba('presenca', this)">PRESENÇA</div>
                    <div class="tab-button" onclick="mudarSubAba('nivel', this)">NÍVEL/FAIXA</div>
                    <div class="tab-button" onclick="mudarSubAba('evolucao', this)">EVOLUÇÃO</div>
                    <div class="tab-button" onclick="mudarSubAba('saude', this)">SAÚDE</div>
                </div>
            </div>
            <div class="form-card">
                <div id="container-iframe"></div>
            </div>
        </section>
    </main>

    <script>
        // URL DO SEU GOOGLE APPS SCRIPT (Certifique-se de que é a URL de execução)
        const urlGoogle = "https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec";
    
        window.onload = function() {
            const inputBuscaCPF = document.getElementById('buscaCPF');
            if (inputBuscaCPF) {
                inputBuscaCPF.addEventListener('input', function(e) {
                    let v = e.target.value.replace(/\D/g, "");
                    if (v.length > 11) v = v.slice(0, 11);
                    v = v.replace(/(\d{3})(\d)/, "$1.$2");
                    v = v.replace(/(\d{3})(\d)/, "$1.$2");
                    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                    e.target.value = v;
                });
            }
        };
    
        function showSection(id, element) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const secao = document.getElementById(id);
            if(secao) secao.classList.add('active');
            if(element) element.classList.add('active');
        }
    
        function abrirAluno(element) {
            document.getElementById('titulo-central').innerText = "PRONTUÁRIO DO ALUNO";
            document.getElementById('wrapper-abas').style.display = "flex"; 
            showSection('secao-registro', element);
            mudarSubAba('cadastro', document.querySelector('.tab-button'));
        }
    
        function mudarSubAba(tipo, element) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            if(element) element.classList.add('active');
            const container = document.getElementById('container-iframe');
            if(tipo === 'cadastro') {
                container.innerHTML = `<iframe id="framePrincipal" name="framePrincipal" src="${urlGoogle}?page=RegistroAlunos" style="width:100%; height:1150px; border:none;"></iframe>`;
            } else {
                container.innerHTML = `<div style="padding:50px; text-align:center; color:#666;">Módulo de <b>${tipo.toUpperCase()}</b> em breve.</div>`;
            }
        }
    
        function limparBusca() {
            document.getElementById('buscaNome').value = "";
            document.getElementById('buscaCPF').value = "";
            document.getElementById('btnWhatsEvolucao').style.display = "none";
            document.getElementById('controlesNavegacao').style.display = "none";
            mudarSubAba('cadastro', document.querySelector('.tab-button'));
        }
    
        let resultadosBusca = [];
        let indiceAtual = 0;

        async function buscarDadosAluno() {
            const nome = document.getElementById('buscaNome').value.trim();
            const cpf = document.getElementById('buscaCPF').value.trim();
            const btn = document.getElementById('btnBuscar');
            
            if(!nome && !cpf) {
                alert("Digite um nome ou CPF.");
                return;
            }

            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                // Chamada via fetch (correta para GitHub -> Google)
                const response = await fetch(`${urlGoogle}?action=buscar&nome=${encodeURIComponent(nome)}&cpf=${encodeURIComponent(cpf)}`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    alert("Nenhum registro encontrado.");
                    btn.innerText = "BUSCAR";
                    btn.disabled = false;
                    return;
                }

                resultadosBusca = data;
                indiceAtual = 0;
                exibirResultado();

            } catch (err) {
                console.error(err);
                alert("Erro ao conectar com o servidor. Verifique se o Script está publicado como 'Qualquer pessoa'.");
            } finally {
                btn.innerText = "BUSCAR";
                btn.disabled = false;
            }
        }

        function exibirResultado() {
            const aluno = resultadosBusca[indiceAtual];
            const controles = document.getElementById('controlesNavegacao');
            const info = document.getElementById('infoResultados');
            const btnWhats = document.getElementById('btnWhatsEvolucao');
            
            if (resultadosBusca.length > 1) {
                controles.style.display = "flex";
                info.innerText = `${indiceAtual + 1} / ${resultadosBusca.length}`;
            } else {
                controles.style.display = "none";
            }

            // Exibe WhatsApp se tiver número
            if(aluno.Aluno_WhatsApp) {
                btnWhats.style.display = "block";
                btnWhats.setAttribute('data-whats', aluno.Aluno_WhatsApp);
                btnWhats.setAttribute('data-link', aluno.Link_De_Acesso || "");
            }

            const iframe = document.getElementById('framePrincipal');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ tipo: 'PREENCHER_FORMULARIO', dados: aluno }, '*');
            }
        }

        function navegarResultados(direcao) {
            indiceAtual += direcao;
            if (indiceAtual < 0) indiceAtual = resultadosBusca.length - 1;
            if (indiceAtual >= resultadosBusca.length) indiceAtual = 0;
            exibirResultado();
        }

        function enviarWhatsEvolucao() {
            const btn = document.getElementById('btnWhatsEvolucao');
            const link = btn.getAttribute('data-link');
            const fone = btn.getAttribute('data-whats');
            if (!link) { alert("Link não disponível."); return; }
            const msg = encodeURIComponent(`Olá! Veja aqui sua evolução: ${link}`);
            window.open(`https://wa.me/${fone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
