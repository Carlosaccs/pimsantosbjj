<script>
    const urlGoogle = "https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec";
    
    let resultadosBusca = [];
    let indiceAtual = 0;

    window.onload = function() {
        const inputBuscaCPF = document.getElementById('buscaCPF');
        if (inputBuscaCPF) {
            inputBuscaCPF.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, "");
                if (v.length > 11) v = v.slice(0, 11);
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                e.target.value = v;
            });
        }
    };

    function showSection(id, element) {
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const secao = document.getElementById(id);
        if(secao) secao.classList.add('active');
        if(element) element.classList.add('active');
    }

    function abrirAluno(element) {
        document.getElementById('titulo-central').innerText = "PRONTUÁRIO DO ALUNO";
        document.getElementById('wrapper-abas').style.display = "flex"; 
        showSection('secao-registro', element);
        mudarSubAba('cadastro', document.querySelector('.tab-button'));
    }

    function mudarSubAba(tipo, element) {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        if(element) element.classList.add('active');
        const container = document.getElementById('container-iframe');
        if(tipo === 'cadastro') {
            // Adicionamos um ID fixo e um evento onload para garantir que o preenchimento só ocorra após o frame carregar
            container.innerHTML = `<iframe id="framePrincipal" name="framePrincipal" src="${urlGoogle}?page=RegistroAlunos" style="width:100%; height:1150px; border:none;"></iframe>`;
        } else {
            container.innerHTML = `<div style="padding:50px; text-align:center; color:#666;">Módulo de <b>${tipo.toUpperCase()}</b> em breve.</div>`;
        }
    }

    function limparBusca() {
        document.getElementById('buscaNome').value = "";
        document.getElementById('buscaCPF').value = "";
        document.getElementById('btnWhatsEvolucao').style.display = "none";
        document.getElementById('controlesNavegacao').style.display = "none";
        resultadosBusca = [];
        mudarSubAba('cadastro', document.querySelector('.tab-button'));
    }

    // FUNÇÃO DE BUSCA CORRIGIDA
    function buscarDadosAluno() {
        const nome = document.getElementById('buscaNome').value.trim().toUpperCase();
        const cpf = document.getElementById('buscaCPF').value.trim();
        
        if(!nome && !cpf) {
            alert("Digite um nome ou CPF.");
            return;
        }

        // Feedback visual de que está carregando
        const btnBusca = document.querySelector('button[onclick="buscarDadosAluno()"]');
        const textoOriginal = btnBusca.innerText;
        btnBusca.innerText = "BUSCANDO...";
        btnBusca.disabled = true;

        google.script.run
            .withSuccessHandler(function(alunos) {
                btnBusca.innerText = textoOriginal;
                btnBusca.disabled = false;

                if (!alunos || alunos.length === 0) {
                    alert("Nenhum registro encontrado.");
                    return;
                }
                resultadosBusca = Array.isArray(alunos) ? alunos : [alunos];
                indiceAtual = 0;
                exibirResultado();
            })
            .withFailureHandler(function(err) {
                btnBusca.innerText = textoOriginal;
                btnBusca.disabled = false;
                alert("Erro na busca: " + err);
            })
            .buscarAlunoNoSheets(nome, cpf);
    }

    function exibirResultado() {
        const aluno = resultadosBusca[indiceAtual];
        const controles = document.getElementById('controlesNavegacao');
        const info = document.getElementById('infoResultados');
        const btnWhats = document.getElementById('btnWhatsEvolucao');
        
        // Controle de Navegação < 1/3 >
        if (resultadosBusca.length > 1) {
            controles.style.display = "flex";
            info.innerText = `${indiceAtual + 1} / ${resultadosBusca.length}`;
        } else {
            controles.style.display = "none";
        }

        // Configura Botão WhatsApp
        if (aluno.Link_De_Acesso) {
            btnWhats.style.display = "block";
            btnWhats.setAttribute('data-link', aluno.Link_De_Acesso);
            btnWhats.setAttribute('data-whats', aluno.Aluno_WhatsApp || "");
        } else {
            btnWhats.style.display = "none";
        }

        // ENVIO PARA O IFRAME (COM SEGURANÇA)
        const iframe = document.getElementById('framePrincipal');
        if (iframe) {
            // Se o iframe acabou de ser criado, ele pode não estar pronto. 
            // Tentamos enviar agora e repetimos em 500ms caso ele esteja carregando.
            const enviar = () => {
                iframe.contentWindow.postMessage({ tipo: 'PREENCHER_FORMULARIO', dados: aluno }, '*');
            };
            enviar();
            setTimeout(enviar, 800); 
        }
    }

    function navegarResultados(direcao) {
        indiceAtual += direcao;
        if (indiceAtual < 0) indiceAtual = resultadosBusca.length - 1;
        if (indiceAtual >= resultadosBusca.length) indiceAtual = 0;
        exibirResultado();
    }

    function enviarWhatsEvolucao() {
        const btn = document.getElementById('btnWhatsEvolucao');
        const link = btn.getAttribute('data-link');
        const fone = btn.getAttribute('data-whats').replace(/\D/g, "");
        if (!link) return alert("Link não encontrado.");
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent('Olá! Segue seu link de evolução: ' + link)}`, '_blank');
    }
</script>
