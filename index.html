<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Santos JJ | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #800000; --gold: #d4af37; --bg-dark: #121212; --bg-card: #1e1e1e; --text-light: #e0e0e0; --accent: #333; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: var(--sidebar-width); background: #000; border-right: 2px solid var(--accent); display: flex; flex-direction: column; padding: 20px 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; text-transform: uppercase; font-family: 'Big Shoulders Display', sans-serif; font-size: 1.3rem; border-left: 4px solid transparent; color: #888; transition: 0.2s; }
        .nav-item.active { background: var(--bg-card); color: #fff; border-left-color: var(--primary); }
        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .form-card { background: var(--bg-card); padding: 30px; border-radius: 4px; border-top: 4px solid var(--primary); max-width: 900px; }
        
        /* ESTILO DOS BOTÕES DE TROCA DE CADASTRO */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; border: 1px solid var(--accent); background: #2a2a2a; color: white; font-family: 'Big Shoulders Display'; font-size: 1.1rem; transition: 0.3s; }
        .tab-btn.active-tab { background: var(--primary); border-color: var(--primary); }

        h2 { font-family: 'Big Shoulders Display', sans-serif; font-size: 2rem; color: #fff; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav>
        <div style="text-align:center; padding-bottom:30px;">
            <div id="logo-container"></div>
            <div style="font-family:'Big Shoulders Display'; font-size: 1.5rem; margin-top:10px;">PIM SANTOS JJ</div>
        </div>
        <div class="nav-item active" onclick="showSection('dashboard')">Painel de Controle</div>
        <div class="nav-item" onclick="showSection('cadastro')">Cadastros</div>
        <div class="nav-item" onclick="showSection('presenca')">Chamada</div>
    </nav>

    <main>
        <section id="dashboard" class="section-content active">
            <h2>Visão Geral</h2>
            <div class="form-card">
                <p>Aqui aparecerão os indicadores de alunos ativos e frequentes.</p>
            </div>
        </section>

        <section id="cadastro" class="section-content">
            <h2 id="titulo-cadastro">CADASTRO DE ALUNOS</h2>
            
            <div class="tab-container">
                <button id="btn-aluno" class="tab-btn active-tab" onclick="trocarForm('aluno')">ALUNOS</button>
                <button id="btn-prof" class="tab-btn" onclick="trocarForm('professor')">PROFESSORES</button>
            </div>

            <div class="form-card">
                <div id="container-formulario">
                    <p style="color:#888;">Selecione o tipo de cadastro acima...</p>
                </div>
            </div>
        </section>

        <section id="presenca" class="section-content">
            <h2>Check-in Tatame</h2>
            </section>
    </main>

    <script src="script.js"></script>
<script>
        // PEGA A URL DA SUA IMPLANTAÇÃO AUTOMATICAMENTE
        // Se você tiver um link fixo do Apps Script, pode colá-lo entre as aspas:
        const scriptUrl = "<?= ScriptApp.getService().getUrl() ?>";

        // Função para trocar as seções do menu lateral
        function showSection(id) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            
            const secao = document.getElementById(id);
            if(secao) {
                secao.classList.add('active');
            }
            
            // Adiciona a classe active no item do menu clicado
            if(event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            
            // Se entrar em cadastro, carrega por padrão o de aluno
            if(id === 'cadastro') {
                trocarForm('aluno');
            }
        }

        // Função que faz a troca de Aluno/Professor dentro da página
        function trocarForm(tipo) {
            const titulo = document.getElementById('titulo-cadastro');
            const container = document.getElementById('container-formulario');
            const btnA = document.getElementById('btn-aluno');
            const btnP = document.getElementById('btn-prof');

            // Se o scriptUrl estiver vazio ou com erro, avisa o usuário
            if(!scriptUrl || scriptUrl.includes("<?=")) {
                container.innerHTML = '<p style="color:red; padding:20px;">Erro: URL do script não definida. Verifique o Código.gs.</p>';
                return;
            }

            if (tipo === 'aluno') {
                titulo.innerText = "CADASTRO DE NOVO ALUNO";
                btnA.classList.add('active-tab');
                btnP.classList.remove('active-tab');
                // Carrega o formulário de Alunos
                container.innerHTML = '<iframe src="'+scriptUrl+'?page=RegistroAlunos" style="width:100%; height:750px; border:none;"></iframe>';
            } else {
                titulo.innerText = "CADASTRO DE NOVO PROFESSOR";
                btnP.classList.add('active-tab');
                btnA.classList.remove('active-tab');
                // Carrega o formulário de Professores
                container.innerHTML = '<iframe src="'+scriptUrl+'?page=RegistroProfessores" style="width:100%; height:500px; border:none;"></iframe>';
            }
        }
    </script>
