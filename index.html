<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Santos JJ | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #800000; --gold: #d4af37; --bg-dark: #121212; --bg-card: #1e1e1e; --text-light: #e0e0e0; --accent: #333; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* MENU LATERAL */
        nav { width: var(--sidebar-width); background: #000; border-right: 2px solid var(--accent); display: flex; flex-direction: column; padding: 20px 0; }
        .nav-item { padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-family: 'Big Shoulders Display', sans-serif; font-size: 1.1rem; border-left: 4px solid transparent; color: #888; transition: 0.2s; }
        .nav-item:hover { color: #fff; background: #111; }
        .nav-item.active { background: var(--bg-card); color: #fff; border-left-color: var(--primary); }
        
        .nav-label { color: #555; font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 25px; text-transform: uppercase; letter-spacing: 1px; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .form-card { background: var(--bg-card); padding: 20px; border-radius: 4px; border-top: 4px solid var(--primary); max-width: 950px; }
        
        h2 { font-family: 'Big Shoulders Display', sans-serif; font-size: 2rem; color: #fff; margin: 0 0 20px 0; text-transform: uppercase; }

        iframe { width: 100%; border: none; background: transparent; }
    </style>
</head>
<body>

    <nav>
        <div style="text-align:center; padding-bottom:20px;">
            <div id="logo-container"></div>
            <div style="font-family:'Big Shoulders Display'; font-size: 1.5rem; margin-top:10px; color: #fff;">PIM SANTOS JJ</div>
        </div>
        
        <div class="nav-item active" onclick="showSection('dashboard', this)">Painel de Controle</div>
        
        <div class="nav-label">Cadastros</div>
        <div class="nav-item" onclick="abrirCadastro('aluno', this)">Cadastro de Aluno</div>
        <div class="nav-item" onclick="abrirCadastro('professor', this)">Cadastro de Professor</div>
        
        <div class="nav-label">Operacional</div>
        <div class="nav-item" onclick="showSection('presenca', this)">Chamada / Check-in</div>
    </nav>

    <main>
        <section id="dashboard" class="section-content active">
            <h2>Visão Geral</h2>
            <div class="form-card">
                <p>Indicadores de alunos ativos e frequentes aparecerão aqui.</p>
            </div>
        </section>

        <section id="cadastro" class="section-content">
            <h2 id="titulo-pagina">CADASTRO</h2>
            <div class="form-card">
                <div id="container-formulario">
                    </div>
            </div>
        </section>

        <section id="presenca" class="section-content">
            <h2>Check-in Tatame</h2>
            <div class="form-card">
                <p>Módulo de chamada em desenvolvimento.</p>
            </div>
        </section>
    </main>

    <script>
        // COLE AQUI O SEU LINK ATUALIZADO DO GOOGLE APPS SCRIPT
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzQwVgPWmdru7mkTqJk3izTZOxruvdFPoAYD_OiZiMJclyvScSkLBwXtRewJshM1GRR/exec";

        // Função genérica para trocar as seções principais
        function showSection(id, element) {
            // Remove active de todos os itens do menu
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            // Esconde todas as seções
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            
            // Ativa a seção e o botão
            document.getElementById(id).classList.add('active');
            if(element) element.classList.add('active');
        }

        // Função específica para abrir os cadastros diretamente pelo menu
        function abrirCadastro(tipo, element) {
            showSection('cadastro', element);
            
            const titulo = document.getElementById('titulo-pagina');
            const container = document.getElementById('container-formulario');

            if (tipo === 'aluno') {
                titulo.innerText = "Cadastro de Novo Aluno";
                container.innerHTML = `<iframe src="${scriptUrl}?page=RegistroAlunos" style="height:780px;"></iframe>`;
            } else {
                titulo.innerText = "Cadastro de Novo Professor";
                container.innerHTML = `<iframe src="${scriptUrl}?page=RegistroProfessores" style="height:550px;"></iframe>`;
            }
        }
    </script>
</body>
</html>
