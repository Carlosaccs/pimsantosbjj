<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Santos BJJ | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #b8860b; 
            --bg-chumbo: #1a1a1a;
            --bg-sidebar: #1a1a1a;
            --bg-card: #111111; 
            --bg-hover: #2d2d2d; 
            --bg-active: #3d3d3d; 
            --text-light: #e0e0e0; 
            --sidebar-width: 260px; 
        }

        * { font-family: 'Roboto', sans-serif !important; box-sizing: border-box; }
        body { background-color: var(--bg-chumbo); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        nav { 
            width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 2px solid var(--primary); 
            display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; overflow-y: auto;
        }

        .nav-label { color: #555; font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 25px; text-transform: uppercase; }
        .nav-item { padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; border-left: 5px solid transparent; color: #888; transition: 0.3s; }
        .nav-item:hover { color: #fff; background: var(--bg-hover); }
        .nav-item.active { background: var(--bg-active); color: #fff; border-left-color: var(--primary); }
        
        main { flex-grow: 1; padding: 15px 25px; overflow-y: auto; background-color: var(--bg-chumbo); } 
        
        .section-content { display: none; height: 100%; }
        .section-content.active { display: block; }

        h2 { 
            font-family: 'Big Shoulders Display', sans-serif !important; 
            font-size: 2.5rem; color: #fff; margin-top: 0; margin-bottom: 10px; text-transform: uppercase; 
        }

        /* LAYOUT PRINCIPAL: FORMULÁRIO À ESQUERDA, LISTA À DIREITA */
        .container-prontuario { display: flex; gap: 20px; height: calc(100vh - 100px); }

        /* ÁREA DO FORMULÁRIO (OCUPA O CENTRO) */
        .painel-formulario { flex-grow: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; }

        /* LISTA LATERAL (DIREITA DA TELA) */
        .painel-lista { 
            width: 250px; background: #111; border: 1px solid #333; 
            border-radius: 4px; display: flex; flex-direction: column; height: 100%; flex-shrink: 0;
        }
        .scroll-lista { flex-grow: 1; overflow-y: auto; padding: 5px 0; }
        .aluno-card { 
            padding: 10px 15px; border-bottom: 1px solid #222; cursor: pointer; 
            transition: 0.2s; font-size: 12px; text-transform: uppercase; color: #bbb;
        }
        .aluno-card:hover { background: #222; color: var(--primary); }
        .aluno-card.selecionado { background: var(--primary); color: #fff; font-weight: bold; }

        .tab-button {
            background: #2d2d2d; color: #888; border: 1px solid #444; padding: 10px 18px;
            cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.75rem; border-radius: 4px;
        }
        .tab-button.active { background: var(--primary); color: white; border-color: var(--primary); }

        .form-card { 
            background: var(--bg-card); padding: 20px; border-radius: 4px; 
            border-top: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: 5px; flex-grow: 1;
        }
        
        iframe { width: 100%; height: 1100px; border: none; background: transparent; }
    </style>
</head>
<body>

    <nav>
        <div style="text-align:center; padding-bottom:30px;">
            <img src="https://carlosaccs.github.io/pimsantosbjj/Logomenor.png" style="width: 120px; height: auto;">
            <div style="font-family:'Big Shoulders Display' !important; font-size: 1.6rem; margin-top:10px; color: #fff;">PIM SANTOS BJJ</div>
        </div>
        <div class="nav-item active" onclick="showSection('dashboard', this)">Painel de Controle</div>
        <div class="nav-label">Gestão de Alunos</div>
        <div class="nav-item" onclick="abrirProntuario(this)">Prontuário do Aluno</div>
        <div class="nav-label">Cadastros</div>
        <div class="nav-item" onclick="showSection('dashboard', this)">Professores</div>
    </nav>

    <main>
        <section id="dashboard" class="section-content active">
            <h2>Visão Geral</h2>
            <div class="form-card" style="height: auto;"><p style="color: #666;">Painel de indicadores em desenvolvimento.</p></div>
        </section>

        <section id="secao-registro" class="section-content">
            <h2>Prontuário do Aluno</h2>
            
            <div class="container-prontuario">
                <div class="painel-formulario">
                    <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                        <div class="tab-button active">CADASTRO</div>
                        <button onclick="limparParaNovo()" style="margin-left:auto; background:#444; border:none; color:#fff; padding:5px 15px; border-radius:4px; cursor:pointer; font-weight:bold;">NOVO</button>
                    </div>
                    <div class="form-card">
                        <div id="container-iframe">
                            <iframe id="framePrincipal" src="https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec?page=RegistroAlunos"></iframe>
                        </div>
                    </div>
                </div>

                <div class="painel-lista">
                    <div style="padding: 10px; background: #222; font-size: 11px; font-weight: bold; color: var(--primary); text-align: center; border-bottom: 1px solid #333;">LISTA DE ALUNOS</div>
                    <div id="listaAlunos" class="scroll-lista">
                        <div style="padding:20px; color:#666; font-size:12px; text-align:center;">Carregando...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const urlGoogle = "https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec";
        let todosAlunos = [];

        function showSection(id, element) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(element) element.classList.add('active');
        }

        async function abrirProntuario(element) {
            showSection('secao-registro', element);
            if (todosAlunos.length === 0) {
                await buscarListaAlunos();
            }
        }

        async function buscarListaAlunos() {
            try {
                const response = await fetch(`${urlGoogle}?action=listarTodos`);
                todosAlunos = await response.json();
                renderizarLista(todosAlunos);
            } catch (err) {
                document.getElementById('listaAlunos').innerHTML = "<div style='padding:20px; color:red;'>Erro de conexão.</div>";
            }
        }

        function renderizarLista(dados) {
            const container = document.getElementById('listaAlunos');
            container.innerHTML = "";
            dados.forEach(aluno => {
                const card = document.createElement('div');
                card.className = "aluno-card";
                card.innerText = aluno.Aluno_Nome;
                card.onclick = () => selecionarAluno(aluno, card);
                container.appendChild(card);
            });
        }

        function selecionarAluno(aluno, elemento) {
            document.querySelectorAll('.aluno-card').forEach(c => c.classList.remove('selecionado'));
            elemento.classList.add('selecionado');
            
            const iframe = document.getElementById('framePrincipal');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ tipo: 'PREENCHER_FORMULARIO', dados: aluno }, '*');
            }
        }

        function limparParaNovo() {
            document.querySelectorAll('.aluno-card').forEach(c => c.classList.remove('selecionado'));
            const iframe = document.getElementById('framePrincipal');
            iframe.src = iframe.src; 
        }
    </script>
</body>
</html>
