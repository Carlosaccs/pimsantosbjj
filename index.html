<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Santos BJJ | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Big+Shoulders+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #b8860b; 
            --bg-chumbo: #1a1a1a;
            --bg-sidebar: #1a1a1a;
            --bg-card: #111111; 
            --bg-hover: #2d2d2d; 
            --bg-active: #3d3d3d; 
            --text-light: #e0e0e0; 
            --sidebar-width: 260px; 
            --vermelho-block: #5a0000;
            --vermelho-viva: #b30000;
        }

        * { font-family: 'Roboto', sans-serif !important; box-sizing: border-box; }
        body { background-color: var(--bg-chumbo); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        nav { 
            width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 2px solid var(--primary); 
            display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; overflow-y: auto;
        }

        .nav-label { color: #555; font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 25px; text-transform: uppercase; }
        .nav-item { padding: 12px 25px; cursor: pointer; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; border-left: 5px solid transparent; color: #888; transition: 0.3s; }
        .nav-item:hover { color: #fff; background: var(--bg-hover); }
        .nav-item.active { background: var(--bg-active); color: #fff; border-left-color: var(--primary); }
        
        main { flex-grow: 1; padding: 40px; overflow-y: auto; background-color: var(--bg-chumbo); }
        h2 { font-family: 'Big Shoulders Display', sans-serif !important; font-size: 2.5rem; color: #fff; margin-bottom: 20px; text-transform: uppercase; }

        /* BARRA DE NAVEGAÇÃO E BOTÃO SALVAR */
        .tab-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .tabs-wrapper { display: flex; gap: 10px; }

        .tab-button {
            background: #2d2d2d; color: #888; border: 1px solid #444; padding: 10px 18px;
            cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.75rem; border-radius: 4px; transition: 0.3s;
        }
        .tab-button.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ESTILO DO BOTÃO SALVAR NO TOPO */
        .btn-salvar {
            background-color: var(--vermelho-block);
            color: #888;
            border: 1px solid #444;
            padding: 10px 30px;
            cursor: not-allowed;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-salvar.ativo {
            background-color: var(--vermelho-viva);
            color: white;
            cursor: pointer;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(179, 0, 0, 0.4);
        }

        .section-content { display: none; }
        .section-content.active { display: block; }
        .form-card { background: var(--bg-card); padding: 20px; border-radius: 4px; border-top: 4px solid var(--primary); max-width: 1100px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        iframe { width: 100%; border: none; background: transparent; }
    </style>
</head>
<body>

    <nav>
        <div style="text-align:center; padding-bottom:30px;">
            <img src="https://carlosaccs.github.io/pimsantosbjj/Logomenor.png" style="width: 120px; height: auto;">
            <div style="font-family:'Big Shoulders Display' !important; font-size: 1.6rem; margin-top:10px; color: #fff;">PIM SANTOS BJJ</div>
        </div>
        <div class="nav-item active" onclick="showSection('dashboard', this)">Painel de Controle</div>
        <div class="nav-label">Gestão de Alunos</div>
        <div class="nav-item" onclick="abrirAluno(this)">Prontuário do Aluno</div>
        <div class="nav-label">Cadastros</div>
        <div class="nav-item" onclick="abrirCadastro('professor', this)">Professores</div>
    </nav>

    <main>
        <section id="secao-aluno" class="section-content">
            <h2 id="nome-aluno-titulo">ALUNO</h2>
            <div class="tab-container">
                <div class="tabs-wrapper">
                    <div class="tab-button active" onclick="mudarSubAba('cadastro', this)">Cadastro</div>
                    <div class="tab-button" onclick="mudarSubAba('presenca', this)">Presença</div>
                    <div class="tab-button" onclick="mudarSubAba('nivel', this)">Nível/Faixa</div>
                </div>
                <button id="btnSalvarGlobal" class="btn-salvar" onclick="dispararSalvamento()" disabled>SALVAR</button>
            </div>
            <div class="form-card"><div id="container-aluno-content"></div></div>
        </section>

        <section id="outros-cadastros" class="section-content">
            <h2 id="titulo-outros">CADASTRO</h2>
            <div class="form-card"><div id="container-outros"></div></div>
        </section>
    </main>

    <script>
        const urlGoogle = "https://script.google.com/macros/s/AKfycbwjgLILyqXtedSQlzz_XMedMRw9armgAQs1mGDUJ0L_SVKAweZ-53YZBgWktgutDDMm/exec";

        function showSection(id, element) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(element) element.classList.add('active');
        }

        function abrirAluno(element) {
            showSection('secao-aluno', element);
            mudarSubAba('cadastro', document.querySelector('.tab-button'));
        }

        function mudarSubAba(tipo, element) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            const container = document.getElementById('container-aluno-content');
            if(tipo === 'cadastro') {
                container.innerHTML = `<iframe id="frameCadastro" src="${urlGoogle}?page=RegistroAlunos" style="width:100%; height:800px;"></iframe>`;
            } else {
                container.innerHTML = `<div style="padding:50px; text-align:center;">Módulo em desenvolvimento.</div>`;
            }
        }

        // COMUNICAÇÃO COM O IFRAME
        function validarFormulario(estaValido) {
            const btn = document.getElementById('btnSalvarGlobal');
            if (estaValido) {
                btn.classList.add('ativo');
                btn.disabled = false;
            } else {
                btn.classList.remove('ativo');
                btn.disabled = true;
            }
        }

        function dispararSalvamento() {
            const iframe = document.querySelector('#container-aluno-content iframe');
            if (iframe) iframe.contentWindow.postMessage('executarSalvar', '*');
        }

        window.addEventListener('message', (event) => {
            if (event.data === 'formPronto') validarFormulario(true);
            if (event.data === 'formIncompleto') validarFormulario(false);
        });
    </script>
</body>
</html>
